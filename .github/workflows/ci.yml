name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4

      - name: Install package
        run: uv sync

      # ── Tool dispatch smoke test ──
      # Verifies python -m entry point works on all platforms.
      - name: Test tool dispatch
        run: |
          uv run python -m ai_dev_browser.tools.browser_start --help

      # ── Headless browser smoke test ──
      - name: Smoke test headless browser
        run: |
          uv run python -c "
          from ai_dev_browser.core.browser import browser_start, browser_stop

          result = browser_start(headless=True, temp=True)
          if 'error' in result:
              print('SKIP:', result['error'])
              exit(0)

          port = result['port']
          pid = result['pid']
          print(f'Started: port={port}, pid={pid}, reused={result.get(\"reused\", False)}')

          stop_result = browser_stop(port=port)
          print(f'Stopped: {stop_result}')
          print('Smoke test passed.')
          "
