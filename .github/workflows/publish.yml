name: Publish to PyPI

# Triggers on every `v*` tag push (e.g. v0.5.3, v0.6.0). The tag is the
# source of truth: setuptools-scm derives the version from it at build time,
# so no pyproject.toml edit is required — just `git tag vX.Y.Z && git push
# --tags` and this workflow handles the rest.
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools-scm needs full git history to compute the version
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Environment is required by the PyPI trusted publisher config —
    # mirror the environment name on PyPI's "pending publisher" page.
    environment:
      name: release
      url: https://pypi.org/project/ai-dev-browser/
    permissions:
      # Required for PyPI OIDC trusted publisher auth — no token needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
